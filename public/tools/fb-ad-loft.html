<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>RG Extreme Pressure — Loft Conversions Ad</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .ad {
    width: 1200px;
    height: 1200px;
    position: relative;
    overflow: hidden;
    background: #0d1520;
  }

  /* ── Photo fills entire card ── */
  .ad__photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── Dark overlay ── */
  .ad::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(13,21,32,0.97) 0%, rgba(13,21,32,0.8) 35%, rgba(13,21,32,0.35) 65%, rgba(13,21,32,0.5) 100%);
    z-index: 2;
  }

  /* ── Bottom content ── */
  .ad__content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 3;
    padding: 60px 70px;
  }

  /* ── Logo ── */
  .ad__brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .ad__brand-mark {
    flex-shrink: 0;
    display: block;
  }

  .ad__brand-text {
    display: flex;
    flex-direction: column;
    gap: 10px;
    line-height: 1;
  }

  .ad__brand-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
  }

  .ad__brand-sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 8px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── Gold rule ── */
  .ad__rule {
    width: 50px;
    height: 3px;
    background: #AE8455;
    margin-bottom: 28px;
  }

  /* ── Heading ── */
  .ad__heading {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 52px;
    font-weight: 700;
    color: #fff;
    line-height: 1.12;
    margin-bottom: 18px;
  }

  .ad__heading .accent {
    color: #AE8455;
  }

  /* ── Body ── */
  .ad__body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.55;
    max-width: 520px;
    margin-bottom: 28px;
  }

  /* ── Trust bar ── */
  .ad__trust {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .ad__trust-stars {
    color: #AE8455;
    letter-spacing: 2px;
    font-size: 14px;
  }

  .ad__trust-score {
    color: #AE8455;
    font-weight: 700;
    font-size: 16px;
  }

  .ad__trust-label {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-weight: 500;
  }

  .ad__trust-sep {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.2);
  }

  .ad__trust-cta {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-weight: 500;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="ad">
  <img class="ad__photo" src="/images/hero-james-bath-property-4.webp" alt="Loft conversion in Bath">

  <div class="ad__content">
    <div class="ad__brand">
      <svg class="ad__brand-mark" width="30" height="20" viewBox="-2 -2 26 18" fill="none" aria-hidden="true"><polyline points="0,14 11,0 22,14" stroke="#AE8455" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"></polyline></svg>
      <div class="ad__brand-text">
        <span class="ad__brand-name">RG Extreme Pressure</span>
        <span class="ad__brand-sub">Builds &amp; Maintenance LTD</span>
      </div>
    </div>
    <div class="ad__rule"></div>
    <div class="ad__heading">Loft Conversions<br>in <span class="accent">Bath</span></div>
    <div class="ad__body">Dormer, Velux, hip-to-gable and mansard conversions. Fixed-price contracts, full building regs and planning managed. Conservation area and listed building compliance as standard.</div>
    <div class="ad__trust">
      <span class="ad__trust-stars">★★★★★</span>
      <span class="ad__trust-score">4.97</span>
      <span class="ad__trust-label">TrustATrader</span>
      <div class="ad__trust-sep"></div>
      <span class="ad__trust-cta">rgextremepressure.co.uk</span>
    </div>
  </div>
</div>

</body>
</html>
